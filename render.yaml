# Render blueprint: one Web Service (the app) + one managed Postgres.
# Deploy: push to GitHub, then in Render -> "New +" -> "Blueprint" -> pick this repo.
services:
  - type: web
    name: submemo
    runtime: node
    plan: free
    # Build both workspaces, then the server serves client/dist + the API.
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: submemo-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # set this secret in the Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

databases:
  - name: submemo-db
    plan: free
